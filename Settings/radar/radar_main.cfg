//通过toggle_radar切换雷达大小
// alias +tab_score_radar "+showscores; toggle_radar"
// alias -tab_score_radar "-showscores"

//[Bind/Setting]

bind "=" radar_size_up
bind "-" radar_size_down

    //===[Scale Map]===
    alias radar_big_map_-11  "cl_radar_scale 0.25"
    alias radar_big_map_-10  "cl_radar_scale 0.30"
    alias radar_big_map_-9   "cl_radar_scale 0.35"
    alias radar_big_map_-8   "cl_radar_scale 0.40"
    alias radar_big_map_-7   "cl_radar_scale 0.45"
    alias radar_big_map_-6   "cl_radar_scale 0.50"
    alias radar_big_map_-5   "cl_radar_scale 0.55"
    alias radar_big_map_-4   "cl_radar_scale 0.60"
    alias radar_big_map_-3   "cl_radar_scale 0.65"
    alias radar_big_map_-2   "cl_radar_scale 0.70"
    alias radar_big_map_-1   "cl_radar_scale 0.75"
    alias radar_big_map_0    "cl_radar_scale 0.80"
    alias radar_big_map_1    "cl_radar_scale 0.85"
    alias radar_big_map_2    "cl_radar_scale 0.90"
    alias radar_big_map_3    "cl_radar_scale 0.95"
    alias radar_big_map_4    "cl_radar_scale 1.00"

    alias radar_small_map_-1 "cl_radar_scale 0.25"
    alias radar_small_map_0  "cl_radar_scale 0.30"
    alias radar_small_map_1  "cl_radar_scale 0.35"
    alias radar_small_map_2  "cl_radar_scale 0.40"
    alias radar_small_map_3  "cl_radar_scale 0.45"
    alias radar_small_map_4  "cl_radar_scale 0.50"
    alias radar_small_map_5  "cl_radar_scale 0.55"
    alias radar_small_map_6  "cl_radar_scale 0.60"
    alias radar_small_map_7  "cl_radar_scale 0.65"
    alias radar_small_map_8  "cl_radar_scale 0.70"
    alias radar_small_map_9  "cl_radar_scale 0.75"
    alias radar_small_map_10 "cl_radar_scale 0.80"
    alias radar_small_map_11 "cl_radar_scale 0.85"
    alias radar_small_map_12 "cl_radar_scale 0.90"
    alias radar_small_map_13 "cl_radar_scale 0.95"
    alias radar_small_map_14 "cl_radar_scale 1.00"

//[Default]

//默认状态
radar_small
alias toggle_radar radar_big

//模式切换
alias radar_big   "exec cstm/Settings/radar/radar_big"
alias radar_small "exec cstm/Settings/radar/radar_small"

//默认档位 0 （可注释以保存档位）
alias radar_big_size      radar_big_map_0
alias radar_big_size_up   radar_big_up_0
alias radar_big_size_down radar_big_down_0

alias radar_small_size      radar_small_map_0
alias radar_small_size_up   radar_small_up_0
alias radar_small_size_down radar_small_down_0

//默认size切换绑定Big模式
alias radar_size_up radar_big_size_up
alias radar_size_down radar_big_size_down

//[Functions]

    //[Mode Swtich]
        alias radar_big_mode "alias radar_size_up radar_big_size_up; alias radar_size_down radar_big_size_down"
        alias radar_small_mode "alias radar_size_up radar_small_size_up; alias radar_size_down radar_small_size_down"

