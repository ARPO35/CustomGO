bind c smokegrenade
bind 4 flashbang
bind x molotov
bind z hegrenade
bind v decoy
bind alt "+refill_prop"

alias flashbang "slot7"
alias hegrenade "slot6"
alias smokegrenade "slot8"
alias molotov "slot10"
alias decoy "slot9; slot12"

alias +refill_prop "noclip; alias flashbang buy flashbang; alias hegrenade buy hegrenade; alias smokegrenade buy smokegrenade; alias molotov buy_molotov; alias decoy buy decoy"

alias buy_molotov "buy molotov; buy incgrenade"

alias -refill_prop "alias flashbang "slot7"; alias hegrenade "slot6"; alias smokegrenade "slot8"; alias molotov "slot10"; alias decoy "slot9; slot12""
